# Ruff Configuration - Ultra-strict Python linting
# Reemplaza: flake8, black, isort, pydocstyle

target-version = "py311"
line-length = 88
indent-width = 4

[lint]
select = [
    # Pyflakes - detecta errores obvios
    "F",
    # Pycodestyle - estilo PEP8
    "E", "W",
    # McCabe - complejidad ciclomática
    "C90",
    # isort - orden de imports
    "I",
    # pep8-naming - convenciones de nombres
    "N",
    # pydocstyle - docstrings
    "D",
    # pyupgrade - mejora código para Python moderno
    "UP",
    # flake8-bugbear - bugs potenciales
    "B",
    # flake8-simplify - simplifica código
    "SIM",
    # flake8-comprehensions - mejora comprehensions
    "C4",
    # flake8-builtins - evita shadowing de builtins
    "A",
    # flake8-return - mejora returns
    "RET",
    # flake8-raise - mejora raise statements
    "RSE",
    # flake8-pie - misceláneo útil
    "PIE",
    # flake8-use-pathlib - usa pathlib
    "PTH",
    # eradicate - elimina código comentado
    "ERA",
    # pylint - reglas de pylint
    "PL",
    # tryceratops - excepciones
    "TRY",
    # ruff-specific rules
    "RUF",
    # flake8-bandit - seguridad
    "S",
    # flake8-annotations - type hints en funciones
    "ANN",
    # flake8-async - async/await
    "ASYNC",
    # perflint - performance hints
    "PERF",
    # refurb - refactoring hints
    "FURB",
]
ignore = [
    # Anotaciones en tests pueden ser más relajadas
    "ANN101",  # self no requiere anotación
    "ANN102",  # cls no requiere anotación
    "ANN401",  # Any permitido en casos específicos
    # Docstrings
    "D100",  # Missing docstring in public module - lo exigimos solo en funciones/clases
    "D104",  # Missing docstring in public package
    "D107",  # Missing docstring in __init__ - la clase ya tiene docstring
    "D203",  # 1 blank line required before class docstring (conflict with D211)
    "D212",  # Multi-line docstring summary should start at the first line (conflict with D213)
    # Otros
    "S101",  # Use of assert detected (permitido en tests)
    "B008",  # Do not perform function calls in argument defaults (FastAPI Depends)
    "TRY003",  # Avoid specifying long messages outside the exception class
    "EM101",  # Exception must not use a string literal (try-raise-msg)
    "EM102",  # Exception must not use an f-string literal
    "PLR0913",  # Too many arguments to function call
    "PLR2004",  # Magic value used in comparison
]
