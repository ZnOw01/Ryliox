name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ops: ${{ steps.filter.outputs.ops }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'launcher.py'
              - 'config.py'
              - 'core/**'
              - 'plugins/**'
              - 'utils/**'
              - 'web/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'pytest.ini'
              - '.env.example'
            frontend:
              - 'frontend/**'
            ops:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            ci:
              - '.github/workflows/**'

  backend-sanity:
    name: Backend sanity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    env:
      DATA_DIR: ${{ github.workspace }}/.ci-data
      OUTPUT_DIR: ${{ github.workspace }}/.ci-output
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install backend dependencies
        run: uv sync

      - name: Compile backend sources
        run: python -m compileall -q core plugins utils web launcher.py config.py

      - name: Smoke app startup and health/status endpoints
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from web.server import create_app

          with TestClient(create_app()) as client:
              for path in ("/api/health", "/api/status"):
                  response = client.get(path)
                  assert response.status_code == 200, f"{path} returned {response.status_code}"

          print("Backend sanity checks passed")
          PY

  backend-unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - changes
      - backend-sanity
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    env:
      DATA_DIR: ${{ github.workspace }}/.ci-data
      OUTPUT_DIR: ${{ github.workspace }}/.ci-output
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install backend dependencies
        run: uv sync

      - name: Run unit tests (exclude integration)
        run: pytest -m unit -q

  backend-integration-tests:
    name: Backend integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - changes
      - backend-unit-tests
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    env:
      DATA_DIR: ${{ github.workspace }}/.ci-data
      OUTPUT_DIR: ${{ github.workspace }}/.ci-output
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install backend dependencies
        run: uv sync

      - name: Run integration tests only
        run: pytest -m integration -q

  frontend-build-check:
    name: Frontend build and check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Run Astro check
        run: bun run check
        working-directory: frontend

      - name: Run frontend tests
        run: bun run test
        working-directory: frontend

      - name: Build frontend
        run: bun run build
        working-directory: frontend

  ops-docker-smoke:
    name: Docker and compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ops == 'true' || needs.changes.outputs.ci == 'true'
    env:
      COMPOSE_PROJECT_NAME: ryliox-ci
      DATA_DIR: ${{ github.workspace }}/.ci-data
      OUTPUT_DIR: ${{ github.workspace }}/.ci-output
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare runtime directories
        run: mkdir -p .ci-data .ci-output

      - name: Validate compose configuration
        run: docker compose config

      - name: Build image
        run: docker build -t ryliox-ci:latest .

      - name: Start container and smoke health endpoint
        run: |
          set -euo pipefail

          container_id="$(docker run -d \
            --name ryliox-ci \
            -p 8000:8000 \
            -e HOST=0.0.0.0 \
            -e PORT=8000 \
            -e DATA_DIR=/app/data \
            -e OUTPUT_DIR=/app/output \
            -v "${DATA_DIR}:/app/data" \
            -v "${OUTPUT_DIR}:/app/output" \
            ryliox-ci:latest)"

          cleanup() {
            docker rm -f "${container_id}" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/health >/tmp/health.json; then
              exit 0
            fi
            sleep 2
          done

          docker logs "${container_id}"
          exit 1
